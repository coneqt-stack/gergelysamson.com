<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gergely Samson</title>

  <style>
    :root {
      --bg: #f7f4ed;
      --text: #1f1f1f;
      --muted: #6f6a60;
      --line: rgba(31, 31, 31, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }

    main {
      width: 100%;
      max-width: 760px;
    }

    .eyebrow {
      font-family: Arial, sans-serif;
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 32px;
    }

    h1 {
      font-size: clamp(48px, 9vw, 96px);
      line-height: 0.95;
      letter-spacing: -0.06em;
      margin: 0 0 32px;
      font-weight: 500;
    }

    .intro {
      font-size: clamp(22px, 4vw, 36px);
      line-height: 1.18;
      max-width: 680px;
      margin: 0 0 48px;
    }

    .status {
      border-top: 1px solid var(--line);
      padding-top: 24px;
      font-family: Arial, sans-serif;
      font-size: 14px;
      letter-spacing: 0.03em;
      color: var(--muted);
    }

    a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid currentColor;
    }

    a:hover {
      color: var(--muted);
    }
  </style>
</head>

<body>
  <main>
    <div class="eyebrow">Personal website</div>

    <h1>Gergely Samson</h1>

    <p class="intro">
      Language professional, wine specialist, journalist and music producer.
    </p>

    <p class="status">
      Website under construction.
    </p>
  </main>
</body>
</html>
